<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCam Pro | Premium Camera Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo">WebCam <span class="accent">Pro</span></h1>
            <p class="subtitle">Experience high-quality web-based streaming.</p>
        </header>

        <main class="camera-hub">
            <div class="video-wrapper glass">
                <video id="videoElement" autoplay playsinline></video>
                <div id="statusMessage" class="status-overlay">Camera is off</div>
            </div>

            <div class="controls-panel glass">
                <button id="startBtn" class="btn btn-primary">
                    <span class="icon">📷</span> Start Camera
                </button>
                <button id="stopBtn" class="btn btn-secondary" disabled>
                    <span class="icon">🚫</span> Stop Camera
                </button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 WebCam Pro. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
